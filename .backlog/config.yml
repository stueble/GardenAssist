project_name: "GardenAssist"
default_status: "Ready"
statuses: ["Ready", "In Progress", "In Review", "Done"]
labels: []
definition_of_done: ["Implementation finished", "Test(s) added", "No regressions introduced", "Documentation updated", "Changes committed"]
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "vim"
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
zero_padded_ids: 3
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "story"
backlog_directory: "docs"
