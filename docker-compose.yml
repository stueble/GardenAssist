services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-file:/data/gardenassist.db}
      - DATA_DIR=/data
      - PORT=3000
    volumes:
      - ./docker_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "${GARDENASSIST_PORT:-3110}:80"
    depends_on:
      - backend
    restart: unless-stopped
