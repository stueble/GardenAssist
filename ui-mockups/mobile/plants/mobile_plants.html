
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  .wrap{display:flex;justify-content:center;padding:1.5rem 0 2rem;font-family:'DM Sans',sans-serif;}
  .phone{width:340px;background:#f8f4ee;border-radius:36px;border:8px solid #1e2e1e;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.2);display:flex;flex-direction:column;height:620px;position:relative;}
  .notch{width:100px;height:22px;background:#1e2e1e;border-radius:0 0 14px 14px;margin:0 auto;flex-shrink:0;}
  .topbar{background:#2d4a2d;display:flex;align-items:center;padding:0 10px;height:44px;gap:4px;flex-shrink:0;}
  .tb-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;color:#c8dfc0;font-size:19px;flex-shrink:0;transition:background .15s;}
  .tb-btn:hover{background:rgba(255,255,255,.12);}
  .tb-title{font-family:'Playfair Display',serif;font-size:16px;color:#fff;font-weight:600;flex:1;}
  .tb-chat{background:rgba(255,255,255,.15);border-radius:8px;position:relative;}
  .tb-chat.open{background:rgba(255,255,255,.28);}
  .tb-badge{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:#7aab6a;border:1.5px solid #2d4a2d;}
  .tb-add{background:rgba(255,255,255,.15);border-radius:8px;margin-left:6px;}
  .view-toggle{display:flex;gap:2px;background:rgba(0,0,0,.2);border-radius:8px;padding:3px;}
  .vt-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;color:#c8dfc0;font-size:15px;transition:all .15s;}
  .vt-btn.active{background:#fff;color:#2d4a2d;}
  .search-area{padding:7px 12px;flex-shrink:0;}
  .search-pill{display:flex;align-items:center;gap:5px;background:#dde8d8;border-radius:20px;padding:2px 10px;}
  .search-pill i{font-size:13px;color:#4a5e4a;flex-shrink:0;}
  .search-pill input{border:none!important;outline:none!important;box-shadow:none!important;-webkit-appearance:none;background:transparent!important;font-size:11px;color:#1e2e1e;font-family:'DM Sans',sans-serif;flex:1;padding:3px 0;}
  .search-pill input::placeholder{color:#8a9e8a;}
  .sep{height:1px;background:#dde8d8;flex-shrink:0;}
  .scroll{flex:1;overflow-y:auto;min-height:0;}
  .plant-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#fff;border-bottom:1px solid #f0f4ee;cursor:pointer;transition:background .12s;}
  .plant-item:hover{background:#f8f4ee;}
  .plant-thumb{width:40px;height:40px;border-radius:8px;background:#eef4eb;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid #dde8d8;}
  .plant-main{flex:1;min-width:0;}
  .plant-name{font-size:11px;font-weight:500;color:#1e2e1e;line-height:1.3;}
  .plant-bot{font-size:9px;color:#8a9e8a;font-style:italic;}
  .plant-sub{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
  .sub-loc{font-size:9px;color:#4a5e4a;display:flex;align-items:center;gap:2px;}
  .sub-loc i{font-size:10px;}
  .sub-zone{font-size:9px;color:#4a78c0;background:#e8f0fb;border-radius:20px;padding:1px 5px;}
  .plant-task{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px;padding-top:1px;}
  .task-badge{font-size:8px;padding:2px 6px;border-radius:20px;font-weight:500;white-space:nowrap;}
  .tb-ov{background:#fdf0ee;color:#c0392b;}
  .tb-due{background:#fef9ee;color:#d4850a;}
  .tb-up{background:#e8f0fb;color:#185fa5;}
  .tb-ok{background:#eef4eb;color:#2d4a2d;}
  .task-name{font-size:8px;color:#8a9e8a;max-width:80px;text-align:right;line-height:1.3;}
  .card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px;}
  .plant-card{background:#fff;border-radius:12px;border:1px solid #dde8d8;overflow:hidden;cursor:pointer;transition:border-color .15s;}
  .plant-card:hover{border-color:#7aab6a;}
  .card-img{width:100%;aspect-ratio:4/3;background:#eef4eb;display:flex;align-items:center;justify-content:center;font-size:36px;border-bottom:1px solid #dde8d8;}
  .card-body{padding:7px 8px 8px;}
  .card-name{font-size:11px;font-weight:500;color:#1e2e1e;line-height:1.3;}
  .card-bot{font-size:8px;color:#8a9e8a;font-style:italic;margin-bottom:4px;}
  .card-loc{font-size:9px;color:#4a5e4a;display:flex;align-items:center;gap:2px;margin-bottom:5px;}
  .card-loc i{font-size:10px;}
  .card-footer{display:flex;align-items:center;justify-content:space-between;}
  .card-zone{font-size:8px;color:#4a78c0;background:#e8f0fb;border-radius:20px;padding:1px 5px;}
  .status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .chat-panel{flex-shrink:0;height:0;overflow:hidden;transition:height .25s ease;background:#fff;border-top:2px solid #2d4a2d;display:flex;flex-direction:column;}
  .chat-panel.open{height:200px;}
  .chat-hdr{padding:8px 12px 7px;border-bottom:1px solid #dde8d8;display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .chat-hdr-ttl{font-size:12px;font-weight:500;color:#1e2e1e;flex:1;}
  .chat-cls{font-size:9px;color:#8a9e8a;cursor:pointer;padding:2px 7px;border:1px solid #dde8d8;border-radius:20px;}
  .chat-msgs{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:5px;min-height:0;}
  .msg{max-width:86%;font-size:10px;line-height:1.45;padding:6px 9px;border-radius:10px;}
  .msg.bot{background:#eef4eb;color:#1e2e1e;align-self:flex-start;border-radius:4px 10px 10px 10px;}
  .msg.user{background:#2d4a2d;color:#fff;align-self:flex-end;border-radius:10px 4px 10px 10px;}
  .chat-inp-row{padding:7px 10px;border-top:1px solid #dde8d8;display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .chat-inp{flex:1;font-size:11px;padding:5px 10px;border:1.5px solid #dde8d8;border-radius:20px;outline:none;font-family:'DM Sans',sans-serif;}
  .chat-inp:focus{border-color:#4a7c4a;}
  .chat-snd{width:28px;height:28px;border-radius:50%;background:#4a7c4a;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .chat-snd i{font-size:13px;color:#fff;}
  .bnav{background:#2d4a2d;display:flex;align-items:center;padding:6px 0 10px;flex-shrink:0;}
  .btab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 0;cursor:pointer;border-radius:8px;}
  .btab i{font-size:19px;color:#c8dfc0;}
  .btab span{font-size:8px;color:#c8dfc0;letter-spacing:.2px;}
  .btab.active i,.btab.active span{color:#fff;}
  .btab.active{background:rgba(255,255,255,.1);}
</style>

<div class="wrap"><div class="phone">
  <div class="notch"></div>
  <div class="topbar">
    <div class="tb-btn"><i class="ti ti-menu-2" aria-hidden="true"></i></div>
    <div class="tb-title">Pflanzen</div>
    <div class="view-toggle">
      <div class="vt-btn active" id="btnList" onclick="setViewMode('list')">
        <i class="ti ti-list" aria-hidden="true"></i>
      </div>
      <div class="vt-btn" id="btnCard" onclick="setViewMode('card')">
        <i class="ti ti-layout-grid" aria-hidden="true"></i>
      </div>
    </div>
    <!-- margin-left via .tb-add class für Abstand zum Toggle -->
    <div class="tb-btn tb-add"><i class="ti ti-plus" aria-hidden="true"></i></div>
    <div class="tb-btn tb-chat" id="chatBtn" onclick="toggleChat()">
      <i class="ti ti-message-circle" aria-hidden="true"></i>
      <div class="tb-badge" id="badge"></div>
    </div>
  </div>

  <div class="search-area">
    <div class="search-pill">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" placeholder="Name, Standort …">
    </div>
  </div>
  <div class="sep"></div>

  <div class="scroll" id="plantScroll"></div>

  <div class="chat-panel" id="chatPanel">
    <div class="chat-hdr">
      <i class="ti ti-message-circle" style="font-size:15px;color:#4a7c4a;" aria-hidden="true"></i>
      <div class="chat-hdr-ttl">Garten-Assistent</div>
      <div class="chat-cls" onclick="toggleChat()">✕</div>
    </div>
    <div class="chat-msgs" id="msgs">
      <div class="msg bot">Du hast 9 Pflanzen. 2 haben überfällige Aufgaben — Rose und Lavendel.</div>
    </div>
    <div class="chat-inp-row">
      <input class="chat-inp" id="inp" placeholder="Frage oder Anweisung …" onkeydown="if(event.key==='Enter')send()">
      <button class="chat-snd" onclick="send()"><i class="ti ti-send" aria-hidden="true"></i></button>
    </div>
  </div>

  <div class="bnav">
    <div class="btab"><i class="ti ti-check" aria-hidden="true"></i><span>Aufgaben</span></div>
    <div class="btab active"><i class="ti ti-plant" aria-hidden="true"></i><span>Pflanzen</span></div>
    <div class="btab"><i class="ti ti-calendar" aria-hidden="true"></i><span>Kalender</span></div>
    <div class="btab"><i class="ti ti-notebook" aria-hidden="true"></i><span>Tagebuch</span></div>
    <div class="btab"><i class="ti ti-map" aria-hidden="true"></i><span>Plan</span></div>
  </div>
</div></div>

<script>
const plants=[
  {emoji:'🌹',name:'Rose',        bot:'Rosa',          loc:'Südbeete',       zone:'Zone 1',status:'overdue', task:'Schneiden'},
  {emoji:'💜',name:'Lavendel',    bot:'Lavandula',     loc:'Terrassenkante', zone:'Zone 1',status:'overdue', task:'Düngen'},
  {emoji:'💙',name:'Hortensie',   bot:'Hydrangea',     loc:'Nordwand',       zone:'Zone 2',status:'due',     task:'Kälteschutz'},
  {emoji:'🌷',name:'Tulpe',       bot:'Tulipa',        loc:'Vordergarten',   zone:'Zone 1',status:'ok',      task:'—'},
  {emoji:'🍁',name:'Fächerahorn', bot:'Acer palmatum', loc:'Terrasse Mitte', zone:'Zone 2',status:'upcoming',task:'Düngen'},
  {emoji:'🌼',name:'Forsythie',   bot:'Forsythia',     loc:'Einfahrt',       zone:'Zone 3',status:'ok',      task:'—'},
  {emoji:'🌸',name:'Pfingstrose', bot:'Paeonia',       loc:'Südbeete',       zone:'Zone 1',status:'upcoming',task:'Schneiden'},
  {emoji:'🌺',name:'Dahlie',      bot:'Dahlia',        loc:'Hochbeet Süd',   zone:'Zone 2',status:'ok',      task:'—'},
  {emoji:'❄️',name:'Schneeglöck.',bot:'Galanthus',     loc:'Nordschatten',   zone:'Zone 3',status:'ok',      task:'—'},
];
const sc={overdue:{dot:'#c0392b',badge:'tb-ov',label:'Überfällig'},due:{dot:'#d4850a',badge:'tb-due',label:'Diese Woche'},upcoming:{dot:'#4a78c0',badge:'tb-up',label:'Demnächst'},ok:{dot:'#4a7c4a',badge:'tb-ok',label:'OK'}};
let viewMode='list';
function setViewMode(m){viewMode=m;document.getElementById('btnList').classList.toggle('active',m==='list');document.getElementById('btnCard').classList.toggle('active',m==='card');render();}
function render(){
  const el=document.getElementById('plantScroll');
  if(viewMode==='list'){
    el.innerHTML=plants.map(p=>{
      const s=sc[p.status];
      const taskHtml=p.task!=='—'?`<span class="task-badge ${s.badge}">${s.label}</span><span class="task-name">${p.task}</span>`:`<span class="task-badge tb-ok">OK</span>`;
      return`<div class="plant-item">
        <div class="plant-thumb">${p.emoji}</div>
        <div class="plant-main">
          <div class="plant-name">${p.name}</div>
          <div class="plant-bot">${p.bot}</div>
          <div class="plant-sub">
            <span class="sub-loc"><i class="ti ti-map-pin" aria-hidden="true"></i>${p.loc}</span>
            <span class="sub-zone">${p.zone}</span>
          </div>
        </div>
        <div class="plant-task">${taskHtml}</div>
      </div>`;
    }).join('');
  }else{
    el.innerHTML=`<div class="card-grid">${plants.map(p=>{
      const s=sc[p.status];
      return`<div class="plant-card">
        <div class="card-img">${p.emoji}</div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-bot">${p.bot}</div>
          <div class="card-loc"><i class="ti ti-map-pin" aria-hidden="true"></i>${p.loc}</div>
          <div class="card-footer"><span class="card-zone">${p.zone}</span><div class="status-dot" style="background:${s.dot}" title="${s.label}"></div></div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }
}
let chatOpen=false;
function toggleChat(){chatOpen=!chatOpen;document.getElementById('chatPanel').classList.toggle('open',chatOpen);document.getElementById('chatBtn').classList.toggle('open',chatOpen);document.getElementById('badge').style.display=chatOpen?'none':'block';if(chatOpen)setTimeout(()=>document.getElementById('inp').focus(),250);}
function send(){const inp=document.getElementById('inp'),txt=inp.value.trim();if(!txt)return;const msgs=document.getElementById('msgs');msgs.innerHTML+=`<div class="msg user">${txt}</div>`;inp.value='';msgs.scrollTop=msgs.scrollHeight;setTimeout(()=>{msgs.innerHTML+=`<div class="msg bot">Gute Frage!</div>`;msgs.scrollTop=msgs.scrollHeight;},600);}
render();
</script>
